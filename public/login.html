<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickReach — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'] },
                    colors: {
                        gray: { 900: '#111827', 950: '#0B0F19' },
                        violet: { 500: '#8B5CF6', 600: '#7C3AED' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0B0F19; }
        .glow { box-shadow: 0 0 40px rgba(139, 92, 246, 0.15); }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.4); }
        }
        .animate-glow { animation: pulse-glow 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-950 text-gray-100">
    <div class="w-full max-w-md mx-auto p-6">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="bg-gradient-to-r from-violet-600 to-indigo-600 p-3 rounded-xl animate-glow">
                    <i data-lucide="zap" class="w-8 h-8 text-white"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white">Quick<span class="text-violet-500">Reach</span></h1>
            <p class="text-gray-400 mt-2 text-sm">Automated Outreach Platform</p>
        </div>

        <!-- Login Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 glow">
            <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg px-4 py-3 mb-4"></div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Email</label>
                    <input type="email" id="email" placeholder="you@example.com"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Password</label>
                    <input type="password" id="password" placeholder="••••••••"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:border-violet-500 focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition-all"
                        onkeydown="if(event.key==='Enter') login()">
                </div>
                
                <button onclick="login()" id="loginBtn"
                    class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white py-3 rounded-xl font-semibold text-sm transition-all flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Sign In
                </button>
            </div>

            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">
                    Don't have an account?
                    <button onclick="toggleSignup()" class="text-violet-400 hover:text-violet-300 font-medium">Sign Up</button>
                </p>
            </div>
        </div>

        <!-- Signup Card (hidden) -->
        <div id="signupCard" class="hidden bg-gray-900 border border-gray-800 rounded-2xl p-8 glow mt-4">
            <h2 class="text-lg font-semibold text-white mb-4">Create Account</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Full Name</label>
                    <input type="text" id="signupName" placeholder="Your Name"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:border-violet-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:border-violet-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters"
                        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:border-violet-500 focus:outline-none transition-all">
                </div>
                <button onclick="signup()"
                    class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white py-3 rounded-xl font-semibold text-sm transition-all">
                    Create Account
                </button>
            </div>
        </div>
    </div>

    <script>
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function toggleSignup() {
            document.getElementById('signupCard').classList.toggle('hidden');
        }

        const supabaseUrl = 'https://bxprwpsbcflpdtqlrist.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4cHJ3cHNiY2ZscGR0cWxyaXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk4OTgsImV4cCI6MjA5MTI1NTg5OH0.At_0A_Y6rZSkFHjoR2fE1oD035jCLr9j_tmSeY-w1uY';
        const _supaClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        var supabase = _supaClient;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return showError('Enter email and password');

            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="w-4 h-4 animate-spin border-2 border-white border-t-transparent rounded-full"></i> Signing In...';
            loginBtn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                showError(error.message);
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            } else {
                window.location.href = '/dashboard.html';
            }
        }

        async function signup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            if (!email || !password || !name) return showError('Fill in all fields');
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            });

            if (error) {
                showError(error.message);
            } else {
                // By default Supabase auto-confirms or needs email verification depending on settings. Assuming auto-login:
                window.location.href = '/dashboard.html';
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
